x-runtime-infra-depends: &runtime-infra-depends
  postgres:
    condition: service_healthy
  redis:
    condition: service_healthy
  minio:
    condition: service_healthy
  minio-init:
    condition: service_completed_successfully

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./env/postgres.env.example
    networks:
      - platform
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
    networks:
      - platform
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    env_file:
      - ./env/minio.env.example
    command:
      - server
      - /data
      - --console-address
      - :9001
    networks:
      - platform
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    restart: "no"
    env_file:
      - ./env/minio.env.example
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - platform
    volumes:
      - ./init/minio:/init:ro
    entrypoint:
      - /bin/sh
      - /init/bootstrap-buckets.sh

  api:
    image: golang:1.26
    restart: unless-stopped
    env_file:
      - ./env/shared.env.example
      - ./env/api.env.example
    depends_on: *runtime-infra-depends
    working_dir: /workspace/apps/api
    command:
      - /usr/local/go/bin/go
      - run
      - ./cmd/api
    networks:
      - platform
    ports:
      - "8080:8080"
    volumes:
      - ..:/workspace
      - retained-log-volume:/var/log/platform

  worker-transcription:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    restart: unless-stopped
    environment:
      WORKER_WORKSPACE_ROOT: /tmp/runtime/transcription
    env_file:
      - ./env/shared.env.example
      - ./env/worker-transcription.env.example
    depends_on:
      <<: *runtime-infra-depends
      api:
        condition: service_started
    working_dir: /workspace
    command:
      - uv
      - run
      - --project
      - /workspace
      - python
      - /workspace/workers/transcription/src/transcriber_worker_transcription_main.py
    networks:
      - platform
    volumes:
      - ..:/workspace
      - whisper-model-cache:/var/cache/whisper
      - retained-log-volume:/var/log/platform

  worker-report:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    restart: unless-stopped
    environment:
      WORKER_WORKSPACE_ROOT: /tmp/runtime/report
    env_file:
      - ./env/shared.env.example
      - ./env/worker-report.env.example
    depends_on:
      <<: *runtime-infra-depends
      api:
        condition: service_started
    working_dir: /workspace
    command:
      - uv
      - run
      - --project
      - /workspace
      - python
      - /workspace/workers/report/src/transcriber_worker_report_main.py
    networks:
      - platform
    volumes:
      - ..:/workspace
      - report-and-deep-research-temp-space:/tmp/runtime
      - retained-log-volume:/var/log/platform

  worker-deep-research:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    restart: unless-stopped
    environment:
      WORKER_WORKSPACE_ROOT: /tmp/runtime/deep-research
    env_file:
      - ./env/shared.env.example
      - ./env/worker-deep-research.env.example
    depends_on:
      <<: *runtime-infra-depends
      api:
        condition: service_started
    working_dir: /workspace
    command:
      - uv
      - run
      - --project
      - /workspace
      - python
      - /workspace/workers/deep-research/src/transcriber_worker_deep_research_main.py
    networks:
      - platform
    volumes:
      - ..:/workspace
      - report-and-deep-research-temp-space:/tmp/runtime
      - retained-log-volume:/var/log/platform

  web:
    image: node:22-alpine
    restart: unless-stopped
    env_file:
      - ./env/web.env.example
    depends_on:
      api:
        condition: service_started
    working_dir: /workspace/apps/web
    command:
      - node
      - /workspace/apps/web/src/serve-dist.mjs
    networks:
      - platform
    ports:
      - "${WEB_HOST_PORT:-3000}:3000"
    volumes:
      - ..:/workspace
      - retained-log-volume:/var/log/platform

  telegram-bot:
    image: python:3.12-alpine
    restart: unless-stopped
    environment:
      PYTHONPATH: /workspace/apps/telegram-bot/src:/workspace/src
    env_file:
      - ./env/telegram-bot.env.example
    depends_on:
      api:
        condition: service_started
    working_dir: /workspace/apps/telegram-bot
    command:
      - python
      - -m
      - telegram_adapter
    networks:
      - platform
    volumes:
      - ..:/workspace
      - retained-log-volume:/var/log/platform

  mcp-server:
    image: node:22-alpine
    restart: unless-stopped
    env_file:
      - ./env/mcp-server.env.example
    depends_on:
      api:
        condition: service_started
    working_dir: /workspace/apps/mcp-server
    command:
      - node
      - --experimental-strip-types
      - /workspace/apps/mcp-server/src/main.ts
    networks:
      - platform
    volumes:
      - ..:/workspace
      - retained-log-volume:/var/log/platform

networks:
  platform:
    driver: bridge

volumes:
  postgres-data:
  minio-data:
  whisper-model-cache:
  report-and-deep-research-temp-space:
  retained-log-volume:
